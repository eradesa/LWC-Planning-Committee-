{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>{% if category %}Edit Program Category{% else %}Add Program Category{% endif %}</h2>
    <a href="{{ url_for('programs_landing') }}" class="btn btn-outline">Back</a>
</div>

<form method="POST" class="form-card"
    action="{% if category %}{{ url_for('category_edit', cat_id=category.id) }}{% else %}{{ url_for('category_add') }}{% endif %}">
    <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" value="{{ category.name if category else '' }}" required>
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="2">{{ category.description if category else '' }}</textarea>
    </div>
    <div class="form-group">
        <label for="sort_order">Sort Order</label>
        <input type="number" id="sort_order" name="sort_order" value="{{ category.sort_order if category else 0 }}">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">{% if category %}Update{% else %}Create{% endif %}</button>
        <a href="{{ url_for('programs_landing') }}" class="btn btn-outline">Cancel</a>
    </div>
</form>
{% endblock %}
