{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>{% if event %}Edit Event{% else %}Add Event{% endif %}</h2>
    <a href="{{ url_for('calendar_view') }}" class="btn btn-outline">Back to Calendar</a>
</div>

<form method="POST" class="form-card" style="max-width:100%;"
    action="{% if event %}{{ url_for('event_edit', eid=event.id) }}{% else %}{{ url_for('event_add') }}{% endif %}">
    <div class="form-row">
        <div class="form-group">
            <label>Title *</label>
            <input type="text" name="title" value="{{ event.title if event else '' }}" required>
        </div>
        <div class="form-group">
            <label>Type Flag</label>
            <select name="type_flag">
                {% for f in type_flags %}
                <option value="{{ f }}" {% if event and event.type_flag == f %}selected{% endif %}>{{ f }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Date *</label>
            <input type="date" name="start_date" value="{{ event.start_date[:10] if event else '' }}" required>
        </div>
        <div class="form-group">
            <label>Recurring</label>
            <select name="recurring_type" id="recurringSelect" onchange="toggleRecurringOptions()">
                {% for r in recurring_types %}
                <option value="{{ r }}" {% if event and event.recurring_type == r %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div id="recurringByGroup" style="{% if not event or event.recurring_type in ('none','weekly','bi_weekly') %}display:none;{% endif %}">
        <div class="form-row">
            <div class="form-group">
                <label>Recurring Mode</label>
                <div style="display:flex;gap:16px;padding-top:6px;">
                    <label><input type="radio" name="recurring_by" value="date"
                        {% if not event or event.recurring_by == 'date' %}checked{% endif %}
                        onchange="toggleRecurringMode()"> Same date each {{ 'month' if event and event.recurring_type in ('monthly','quarterly') else 'year' }}</label>
                    <label><input type="radio" name="recurring_by" value="day"
                        {% if event and event.recurring_by == 'day' %}checked{% endif %}
                        onchange="toggleRecurringMode()"> Same weekday pattern</label>
                </div>
            </div>
        </div>
        <div id="recurringDayOptions" style="{% if not event or event.recurring_by != 'day' %}display:none;{% endif %}">
            <div class="form-row">
                <div class="form-group">
                    <label>Ordinal</label>
                    <select name="recurring_ordinal">
                        <option value="1" {% if event and event.recurring_ordinal == 1 %}selected{% endif %}>1st</option>
                        <option value="2" {% if event and event.recurring_ordinal == 2 %}selected{% endif %}>2nd</option>
                        <option value="3" {% if event and event.recurring_ordinal == 3 %}selected{% endif %}>3rd</option>
                        <option value="4" {% if event and event.recurring_ordinal == 4 %}selected{% endif %}>4th</option>
                        <option value="5" {% if event and event.recurring_ordinal == 5 %}selected{% endif %}>Last</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Weekday</label>
                    <select name="recurring_weekday">
                        <option value="0" {% if event and event.recurring_weekday == 0 %}selected{% endif %}>Monday</option>
                        <option value="1" {% if event and event.recurring_weekday == 1 %}selected{% endif %}>Tuesday</option>
                        <option value="2" {% if event and event.recurring_weekday == 2 %}selected{% endif %}>Wednesday</option>
                        <option value="3" {% if event and event.recurring_weekday == 3 %}selected{% endif %}>Thursday</option>
                        <option value="4" {% if event and event.recurring_weekday == 4 %}selected{% endif %}>Friday</option>
                        <option value="5" {% if event and event.recurring_weekday == 5 %}selected{% endif %}>Saturday</option>
                        <option value="6" {% if event and event.recurring_weekday == 6 %}selected{% endif %}>Sunday</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group" id="expiryGroup" style="{% if not event or event.recurring_type == 'none' %}display:none;{% endif %}">
            <label>Recurring Expiry Date</label>
            <input type="date" name="expiry_date" value="{{ event.expiry_date[:10] if event and event.expiry_date else '' }}">
        </div>
        <div class="form-group">
            <label>Link to Sub-Program (optional)</label>
            <select name="sub_program_id" id="subSelect" onchange="updateAssignees()">
                <option value="">— None —</option>
                {% for sp in subs %}
                <option value="{{ sp.id }}" {% if event and event.sub_program_id == sp.id %}selected{% endif %}>{{ sp.title }}{% if sp.due_date %} — {{ sp.due_date }}{% endif %}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    {% if not event %}
    <div class="form-group" id="assigneeGroup" style="display:none;">
        <label>Assign To (creates a task in the sub-program)</label>
        <select name="assignee_id">
            <option value="">— Unassigned —</option>
        </select>
    </div>
    {% endif %}
    <div class="form-group">
        <label>Notes</label>
        <textarea name="notes" rows="3">{{ event.notes if event else '' }}</textarea>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">{% if event %}Update{% else %}Add{% endif %} Event</button>
        {% if event %}
        <button type="button" class="btn btn-red" data-confirm-delete="{{ url_for('event_delete', eid=event.id) }}" data-confirm-message="Delete '{{ event.title }}'?">Delete</button>
        {% endif %}
        <a href="{{ url_for('calendar_view') }}" class="btn btn-outline">Cancel</a>
    </div>
</form>

<script>
var subsData = {{ subs|tojson }};
var membersData = {{ members|tojson }};

function computeOrdinalWeekday(dateStr) {
    if (!dateStr) return { ordinal: 1, weekday: 0 };
    var d = new Date(dateStr + 'T12:00:00');
    var jsWeekday = d.getDay(); // 0=Sun, 6=Sat
    var pyWeekday = (jsWeekday + 6) % 7; // to Python: 0=Mon, 6=Sun
    var day = d.getDate();
    var ordinal = Math.ceil(day / 7);
    return { ordinal: ordinal, weekday: pyWeekday };
}

function fillDayModeFromDate(dateStr) {
    var ow = computeOrdinalWeekday(dateStr);
    document.querySelector('select[name="recurring_ordinal"]').value = ow.ordinal;
    document.querySelector('select[name="recurring_weekday"]').value = ow.weekday;
}

function toggleRecurringOptions() {
    var sel = document.getElementById('recurringSelect');
    var val = sel.value;
    var g = document.getElementById('expiryGroup');
    var expiryInput = g.querySelector('input');
    var isRecurring = val !== 'none';
    g.style.display = isRecurring ? 'block' : 'none';
    expiryInput.required = isRecurring;
    var rg = document.getElementById('recurringByGroup');
    rg.style.display = (val === 'monthly' || val === 'quarterly' || val === 'annual') ? 'block' : 'none';
    if (rg.style.display === 'none') {
        document.getElementById('recurringDayOptions').style.display = 'none';
    } else {
        toggleRecurringMode();
    }
}

function toggleRecurringMode() {
    var by = document.querySelector('input[name="recurring_by"]:checked');
    var dg = document.getElementById('recurringDayOptions');
    var show = by && by.value === 'day';
    dg.style.display = show ? 'block' : 'none';
    if (show) {
        var dateInput = document.querySelector('input[name="start_date"]');
        if (dateInput && dateInput.value) {
            fillDayModeFromDate(dateInput.value);
        }
    }
}

document.addEventListener('DOMContentLoaded', function() {
    var dateInput = document.querySelector('input[name="start_date"]');
    if (dateInput) {
        dateInput.addEventListener('change', function() {
            var by = document.querySelector('input[name="recurring_by"]:checked');
            if (by && by.value === 'day') {
                fillDayModeFromDate(this.value);
            }
        });
    }
});

function updateAssignees() {
    var sel = document.getElementById('subSelect');
    var g = document.getElementById('assigneeGroup');
    var val = sel.value;
    if (!val) { g.style.display = 'none'; return; }
    g.style.display = 'block';
    var assigneeSel = g.querySelector('select');
    assigneeSel.innerHTML = '<option value="">— Unassigned —</option>';
    membersData.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name + (m.designation ? ' (' + m.designation + ')' : '');
        assigneeSel.appendChild(opt);
    });
}

document.addEventListener('DOMContentLoaded', function() {
    var sel = document.getElementById('subSelect');
    if (sel.value) updateAssignees();
    toggleRecurringOptions();
});
</script>
{% endblock %}
