{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>Import Data</h2>
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Back to Dashboard</a>
</div>

<form method="POST" enctype="multipart/form-data" class="form-card">
    <div class="form-group">
        <label>Entity Type</label>
        <select name="entity" required>
            <option value="">— Select —</option>
            <option value="members" {% if entity == 'members' %}selected{% endif %}>Members</option>
            <option value="tasks" {% if entity == 'tasks' %}selected{% endif %}>Tasks</option>
            <option value="events" {% if entity == 'events' %}selected{% endif %}>Events</option>
        </select>
    </div>
    <div class="form-group">
        <label>CSV File</label>
        <input type="file" name="file" accept=".csv" required>
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Import</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
    </div>
</form>

<div class="form-card" style="margin-top:20px;max-width:100%;">
    <h3 style="font-size:14px;color:#1a3a5c;margin-bottom:8px;">Expected CSV Columns</h3>
    <table>
        <thead><tr><th>Entity</th><th>Columns</th></tr></thead>
        <tbody>
            <tr><td>Members</td><td><code>name, designation, phone, email</code></td></tr>
            <tr><td>Tasks</td><td><code>title, due_date, priority</code> (assigned to first sub-program)</td></tr>
            <tr><td>Events</td><td><code>title, start_date, type_flag, recurring_type, notes</code></td></tr>
        </tbody>
    </table>
</div>
{% endblock %}
