{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>{% if sub %}Edit: {{ sub.title }}{% else %}New Sub-Program{% endif %}</h2>
    <a href="{% if sub %}{{ url_for('sub_program_detail', sub_id=sub.id) }}{% else %}{{ url_for('programs_landing') }}{% endif %}" class="btn btn-outline">Back</a>
</div>

<form method="POST" class="form-card" style="max-width:100%;">
    <div class="form-row">
        <div class="form-group">
            <label>Program Category</label>
            <select name="program_category_id" required>
                {% for c in categories %}
                <option value="{{ c.id }}" {% if sub and sub.program_category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" value="{{ sub.title if sub else '' }}" required>
        </div>
    </div>
    <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3">{{ sub.description if sub else '' }}</textarea>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Due Date</label>
            <input type="date" name="due_date" value="{{ sub.due_date[:10] if sub and sub.due_date else '' }}">
        </div>
        <div class="form-group">
            <label>In-Charge</label>
            <select name="in_charge_id">
                <option value="">— None —</option>
                {% for m in members %}
                <option value="{{ m.id }}" {% if sub and sub.in_charge_id == m.id %}selected{% endif %}>{{ m.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Recurring</label>
            <select name="recurring_type" id="recurringSelect" onchange="toggleRecurringOptions()">
                {% for r in recurring_types %}
                <option value="{{ r }}" {% if sub and sub.recurring_type == r %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Type Flag</label>
            <select name="type_flag">
                {% for f in type_flags %}
                <option value="{{ f }}" {% if sub and sub.type_flag == f %}selected{% endif %}>{{ f }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div id="recurringByGroup" style="{% if not sub or sub.recurring_type in ('none','weekly','bi_weekly') %}display:none;{% endif %}">
        <div class="form-row">
            <div class="form-group">
                <label>Recurring Mode</label>
                <div style="display:flex;gap:16px;padding-top:6px;">
                    <label><input type="radio" name="recurring_by" value="date"
                        {% if not sub or sub.recurring_by == 'date' %}checked{% endif %}
                        onchange="toggleRecurringMode()"> Same date</label>
                    <label><input type="radio" name="recurring_by" value="day"
                        {% if sub and sub.recurring_by == 'day' %}checked{% endif %}
                        onchange="toggleRecurringMode()"> Same weekday pattern</label>
                </div>
            </div>
        </div>
        <div id="recurringDayOptions" style="{% if not sub or sub.recurring_by != 'day' %}display:none;{% endif %}">
            <div class="form-row">
                <div class="form-group">
                    <label>Ordinal</label>
                    <select name="recurring_ordinal">
                        <option value="1" {% if sub and sub.recurring_ordinal == 1 %}selected{% endif %}>1st</option>
                        <option value="2" {% if sub and sub.recurring_ordinal == 2 %}selected{% endif %}>2nd</option>
                        <option value="3" {% if sub and sub.recurring_ordinal == 3 %}selected{% endif %}>3rd</option>
                        <option value="4" {% if sub and sub.recurring_ordinal == 4 %}selected{% endif %}>4th</option>
                        <option value="5" {% if sub and sub.recurring_ordinal == 5 %}selected{% endif %}>Last</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Weekday</label>
                    <select name="recurring_weekday">
                        <option value="0" {% if sub and sub.recurring_weekday == 0 %}selected{% endif %}>Monday</option>
                        <option value="1" {% if sub and sub.recurring_weekday == 1 %}selected{% endif %}>Tuesday</option>
                        <option value="2" {% if sub and sub.recurring_weekday == 2 %}selected{% endif %}>Wednesday</option>
                        <option value="3" {% if sub and sub.recurring_weekday == 3 %}selected{% endif %}>Thursday</option>
                        <option value="4" {% if sub and sub.recurring_weekday == 4 %}selected{% endif %}>Friday</option>
                        <option value="5" {% if sub and sub.recurring_weekday == 5 %}selected{% endif %}>Saturday</option>
                        <option value="6" {% if sub and sub.recurring_weekday == 6 %}selected{% endif %}>Sunday</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    <div class="form-group">
        <label>
            <input type="checkbox" name="add_to_calendar" value="1" {% if sub and sub.add_to_calendar %}checked{% endif %}>
            Add to Calendar
        </label>
    </div>
    <div class="form-group">
        <label>Notes</label>
        <textarea name="notes" rows="4">{{ sub.notes if sub else '' }}</textarea>
    </div>

    <div class="form-group">
        <label>Team Members</label>
        <div class="member-checklist">
            {% for m in members %}
            <label class="check-label">
                <input type="checkbox" name="member_ids" value="{{ m.id }}"
                    {% if sub and m.id in team_ids %}checked{% endif %}>
                {{ m.name }}
                {% if m.designation %}<span style="color:#888;font-size:11px;">({{ m.designation }})</span>{% endif %}
            </label>
            {% endfor %}
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">{% if sub %}Update{% else %}Create{% endif %} Sub-Program</button>
        <a href="{% if sub %}{{ url_for('sub_program_detail', sub_id=sub.id) }}{% else %}{{ url_for('programs_landing') }}{% endif %}" class="btn btn-outline">Cancel</a>
    </div>
</form>

<script>
function computeOrdinalWeekday(dateStr) {
    if (!dateStr) return { ordinal: 1, weekday: 0 };
    var d = new Date(dateStr + 'T12:00:00');
    var jsWeekday = d.getDay();
    var pyWeekday = (jsWeekday + 6) % 7;
    var day = d.getDate();
    var ordinal = Math.ceil(day / 7);
    return { ordinal: ordinal, weekday: pyWeekday };
}

function fillDayModeFromDate(dateStr) {
    var ow = computeOrdinalWeekday(dateStr);
    document.querySelector('select[name="recurring_ordinal"]').value = ow.ordinal;
    document.querySelector('select[name="recurring_weekday"]').value = ow.weekday;
}

function toggleRecurringOptions() {
    var sel = document.getElementById('recurringSelect');
    var val = sel.value;
    var isRecurring = val !== 'none';

    var expiryInput = document.querySelector('input[name="expiry_date"]');
    if (expiryInput) expiryInput.required = isRecurring;

    var rg = document.getElementById('recurringByGroup');
    rg.style.display = (val === 'monthly' || val === 'quarterly' || val === 'annual') ? 'block' : 'none';
    if (rg.style.display !== 'none') {
        toggleRecurringMode();
    } else {
        document.getElementById('recurringDayOptions').style.display = 'none';
    }
}

function toggleRecurringMode() {
    var by = document.querySelector('input[name="recurring_by"]:checked');
    var dg = document.getElementById('recurringDayOptions');
    var show = by && by.value === 'day';
    dg.style.display = show ? 'block' : 'none';
    if (show) {
        var dateInput = document.querySelector('input[name="due_date"]');
        if (dateInput && dateInput.value) {
            fillDayModeFromDate(dateInput.value);
        }
    }
}

document.addEventListener('DOMContentLoaded', function() {
    var dateInput = document.querySelector('input[name="due_date"]');
    if (dateInput) {
        dateInput.addEventListener('change', function() {
            var by = document.querySelector('input[name="recurring_by"]:checked');
            if (by && by.value === 'day') {
                fillDayModeFromDate(this.value);
            }
        });
    }
    toggleRecurringOptions();
});
</script>
{% endblock %}
