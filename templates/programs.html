{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>Programs</h2>
    <a href="{{ url_for('sub_program_add') }}" class="btn btn-primary">+ Add New Sub-Program</a>
</div>

<div class="card-grid">
    {% for c in categories %}
    <a href="{{ url_for('program_category', cat_id=c.id) }}" class="card-link">
        <div class="card hoverable">
            <div class="card-number">{{ c.active_count }}/{{ c.sub_count }}</div>
            <div class="card-label" style="font-size:14px;font-weight:600;color:#1a3a5c;text-transform:none;">{{ c.name }}</div>
            <div style="font-size:12px;color:#888;">{{ c.active_count }} active</div>
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
