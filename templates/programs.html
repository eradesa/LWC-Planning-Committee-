{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>Programs{% if status %} — {{ status }}{% endif %}</h2>
    <div>
        <a href="{{ url_for('sub_program_add') }}" class="btn btn-primary">+ Add New Sub-Program</a>
        {% if status %}<a href="{{ url_for('programs_landing') }}" class="btn btn-outline">Clear Filter</a>{% endif %}
    </div>
</div>

<div class="card-grid">
    {% for c in categories %}
    <div class="card hoverable" style="position:relative;">
        <a href="{{ url_for('program_category', cat_id=c.id, status=status) if status else url_for('program_category', cat_id=c.id) }}" class="card-link">
            <div class="card-number">{{ c.active_count }}/{{ c.sub_count }}</div>
            <div class="card-label" style="font-size:14px;font-weight:600;color:#1a3a5c;text-transform:none;">{{ c.name }}</div>
            <div style="font-size:12px;color:#888;">{{ c.active_count }} active</div>
        </a>
        <a href="{{ url_for('category_edit', cat_id=c.id) }}" class="btn btn-sm btn-outline" style="position:absolute;top:8px;right:8px;font-size:11px;padding:3px 8px;">Edit</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
