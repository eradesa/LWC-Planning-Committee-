{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>{% if member %}Edit Member{% else %}Add Member{% endif %}</h2>
    <a href="{{ url_for('member_list') }}" class="btn btn-outline">Back</a>
</div>

<form method="POST" class="form-card">
    <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" value="{{ member.name if member else '' }}" required>
    </div>
    <div class="form-group">
        <label for="designation">Designation</label>
        <input type="text" id="designation" name="designation" value="{{ member.designation if member else '' }}" placeholder="e.g. Pastor, Elder, Usher, Committee">
    </div>
    <div class="form-group">
        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" value="{{ member.phone if member else '' }}">
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ member.email if member else '' }}">
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('member_list') }}" class="btn btn-outline">Cancel</a>
    </div>
</form>
{% endblock %}
