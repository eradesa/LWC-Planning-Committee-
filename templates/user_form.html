{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>{% if user %}Edit User{% else %}Add User{% endif %}</h2>
    <a href="{{ url_for('user_list') }}" class="btn btn-outline">Back</a>
</div>

<form method="POST" class="form-card">
    <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" value="{{ user.username if user else '' }}" required>
    </div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ user.email if user else '' }}" required>
    </div>
    <div class="form-group">
        <label>Display Name</label>
        <input type="text" name="display_name" value="{{ user.display_name if user else '' }}">
    </div>
    <div class="form-group">
        <label>Role</label>
        <select name="role">
            <option value="viewer" {% if user and user.role == 'viewer' %}selected{% endif %}>Viewer</option>
            <option value="power_user" {% if user and user.role == 'power_user' %}selected{% endif %}>Power User</option>
            <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>Admin</option>
        </select>
    </div>
    {% if not user %}
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
    </div>
    {% endif %}
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('user_list') }}" class="btn btn-outline">Cancel</a>
    </div>
</form>
{% endblock %}
